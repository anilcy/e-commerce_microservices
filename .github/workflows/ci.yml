name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Build & Test ───────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore EcommerceMicroservices.sln

      - name: Build solution
        run: dotnet build EcommerceMicroservices.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test EcommerceMicroservices.sln --no-build --configuration Release --verbosity normal
        # This step won't fail if there are no test projects yet —
        # it will just say "No test projects found" and pass.
        # When you add integration tests later, they'll run here automatically.

  # ── Job 2: Docker Build Verification ─────────────────────────────────────
  # Runs only on push to main (not on PRs) after build-and-test passes.
  # Builds all Docker images to verify Dockerfiles are valid.
  # Does NOT push to any registry — no credentials needed.
  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Identity image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.Identity
          push: false
          tags: ecommerce/identity-api:ci

      - name: Build Catalog image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.Catalog
          push: false
          tags: ecommerce/catalog-api:ci

      - name: Build Order image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.Order
          push: false
          tags: ecommerce/order-api:ci

      - name: Build Gateway image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.Gateway
          push: false
          tags: ecommerce/gateway:ci
