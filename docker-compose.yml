version: '3.9'

services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI → http://localhost:15672 (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  identity-db:
    image: postgres:16
    container_name: identity-db
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - identity-db-data:/var/lib/postgresql/data

  catalog-db:
    image: postgres:16
    container_name: catalog-db
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - catalog-db-data:/var/lib/postgresql/data

  order-db:
    image: postgres:16
    container_name: order-db
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data

  # ── Services ─────────────────────────────────────────────────────────────────

  identity-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.Identity
    container_name: identity-api
    ports:
      - "5001:8080"
    depends_on:
      identity-db:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=identity-db;Port=5432;Database=identity_db;Username=postgres;Password=postgres
      - Jwt__Secret=CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_KEY_32_CHARS
      - Jwt__Issuer=EcommerceApp
      - Jwt__Audience=EcommerceApp
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest

  catalog-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.Catalog
    container_name: catalog-api
    ports:
      - "5002:8080"
    depends_on:
      catalog-db:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=catalog-db;Port=5432;Database=catalog_db;Username=postgres;Password=postgres
      - Jwt__Secret=CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_KEY_32_CHARS
      - Jwt__Issuer=EcommerceApp
      - Jwt__Audience=EcommerceApp
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest

  order-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.Order
    container_name: order-api
    ports:
      - "5003:8080"
    depends_on:
      order-db:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=order-db;Port=5432;Database=order_db;Username=postgres;Password=postgres
      - Jwt__Secret=CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_KEY_32_CHARS
      - Jwt__Issuer=EcommerceApp
      - Jwt__Audience=EcommerceApp
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest

  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.Gateway
    container_name: gateway
    ports:
      - "5000:8080"   # ← This is your single entry point for everything
    depends_on:
      - identity-api
      - catalog-api
      - order-api

volumes:
  identity-db-data:
  catalog-db-data:
  order-db-data:
